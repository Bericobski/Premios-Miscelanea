<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Login</h2>

        <form class="auth-form">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="text" id="login-email" placeholder="example@mail.com" [(ngModel)]="user.username" name="username"/>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="********" [(ngModel)]="user.password" name="password"/>
            </div>

            <button type="submit" class="auth-button" (click)="onLogin()">Log In</button>

            @if(error) {
                <p class="error-message">{{ error }}</p>
            }

            <p class="auth-switch">
                Don't have an account?
                <a routerLink="/register">Sign up</a>
            </p>
        </form>
    </div>
</div>
