<div class="contact-us-page-body">

    <div class="contact-us-page">
        <h1>Contact Us</h1>
        <p>If you have any questions, suggestions, or feedback, please feel free to reach out to us. We would love to
            hear from you!</p>

        <form class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input id="name" type="text" placeholder="Your name" />
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Your email" />
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" placeholder="Your message"></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>

        
        <p>You can email us at: <a href="mailto:info@company.com">info@company.com</a></p>
    </div>


</div>

<app-footer></app-footer>
