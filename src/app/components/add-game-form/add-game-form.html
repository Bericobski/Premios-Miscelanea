
<div class="form-container">
    <h1>Add a Game</h1>

    <form class="game-form">

        <div class="form-group">
            <label for="name">Game Name</label>
            <input id="name" type="text" placeholder="Enter game name" />
        </div>

        <div class="form-group">
            <label for="category">Award Category</label>
            <select id="category">
                <option value="">Select category</option>
                <option>Best Gameplay</option>
                <option>Best Story</option>
                <option>Most Addictive</option>
                <option>Hidden Gem</option>
            </select>
        </div>

        <div class="form-group">
            <label for="genre">Genre</label>
            <select id="genre">
                <option value="">Select genre</option>
                <option>Action</option>
                <option>RPG</option>
                <option>Strategy</option>
                <option>Indie</option>
            </select>
        </div>

        <div class="form-group">
            <label for="studio">Studio</label>
            <input id="studio" type="text" placeholder="Game studio" />
        </div>

        <div class="form-group">
            <label for="year">Release Year</label>
            <input id="year" type="number" placeholder="2024" />
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" rows="5" placeholder="Write a short description..."></textarea>
        </div>

        <button type="submit" class="submit-btn">
            Submit Game
        </button>

    </form>
</div>
